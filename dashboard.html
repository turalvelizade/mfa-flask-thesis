<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    /* reset all default spacing and used border-box sizing across every element */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    /* set a white background and a clean sans-serif font for the whole page */
    body { background: #fff; font-family: Arial, sans-serif; }
    /* centered the content block and pushed it down from the top with a fixed margin */
    .wrap { width: 300px; margin: 120px auto; }
    h2 { margin-bottom: 16px; font-size: 20px; }
    p { font-size: 14px; color: #333; margin-bottom: 20px; }
    a { font-size: 13px; color: #555; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Dashboard</h2>
    <!-- displayed the authenticated username passed from the Flask route -->
    <p>Logged in as <strong>{{ username }}</strong>. MFA verified successfully.</p>
    <!-- gave the user a way to end their session and return to the login page -->
    <a href="/logout">Logout</a>
  </div>
</body>
</html>
