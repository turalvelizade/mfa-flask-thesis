<!DOCTYPE html>
<html>
<head>
  <title>Choose MFA Method</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; font-family: Arial, sans-serif; }
    .wrap { width: 300px; margin: 120px auto; }
    h2 { margin-bottom: 24px; font-size: 20px; }
    p { font-size: 13px; color: #555; margin-bottom: 16px; }
    label { display: block; font-size: 14px; margin-bottom: 12px; cursor: pointer; }
    label input { margin-right: 8px; }
    button { width: 100%; padding: 9px; background: #222; color: #fff; border: none; border-radius: 3px; font-size: 14px; cursor: pointer; margin-top: 8px; }
    button:hover { background: #444; }
    .error { color: red; font-size: 13px; margin-bottom: 12px; }
    a { font-size: 13px; color: #555; display: block; margin-top: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Two-Factor Authentication</h2>
    <p>Choose how to receive your code:</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post">
      <label><input type="radio" name="method" value="sms" required> SMS</label>
      <label><input type="radio" name="method" value="email"> Email</label>
      <label><input type="radio" name="method" value="totp"> Authenticator App (TOTP)</label>
      <button type="submit">Continue</button>
    </form>
    <a href="/">← Back to login</a>
  </div>

  <script>
    // ------------------------------------------------------------------
    // BANDWIDTH MEASUREMENT - STEP 2 of 4 (MFA method selection page)
    //
    // We ADD this page's bytes to the running total in sessionStorage.
    // This page is the same for all three MFA methods so its bytes are
    // equal across SMS, Email, and TOTP — but we still count it because
    // it is a real part of the authentication workflow every time.
    // ------------------------------------------------------------------
    window.addEventListener("load", function () {

      var pageBytes = 0;

      var nav = performance.getEntriesByType("navigation");
      if (nav.length > 0) pageBytes += (nav[0].transferSize || 0);

      performance.getEntriesByType("resource").forEach(function (e) {
        pageBytes += (e.transferSize || 0);
      });

      // Add to running total (fall back to 0 if login page was skipped)
      var prev = parseInt(sessionStorage.getItem("mfa_total_bytes") || "0", 10);
      sessionStorage.setItem("mfa_total_bytes", (prev + pageBytes).toString());

      // Append to per-page log
      try {
        var log = JSON.parse(sessionStorage.getItem("mfa_page_log") || "[]");
        log.push({ page: "mfa_select", bytes: pageBytes });
        sessionStorage.setItem("mfa_page_log", JSON.stringify(log));
      } catch (e) {}

      console.log("[BW] mfa_select page: " + pageBytes + " bytes | running total: " + (prev + pageBytes));
    });
  </script>
</body>
</html>
