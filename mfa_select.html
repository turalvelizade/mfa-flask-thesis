<!DOCTYPE html>
<html>
<head>
  <title>Choose MFA Method</title>
  <style>
    /* reset all default spacing and used border-box sizing across every element */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    /* set a white background and a clean sans-serif font for the whole page */
    body { background: #fff; font-family: Arial, sans-serif; }
    /* centered the content block and pushed it down from the top with a fixed margin */
    .wrap { width: 300px; margin: 120px auto; }
    h2 { margin-bottom: 24px; font-size: 20px; }
    p { font-size: 13px; color: #555; margin-bottom: 16px; }
    /* made the entire label clickable so the user can click the text to select the radio */
    label { display: block; font-size: 14px; margin-bottom: 12px; cursor: pointer; }
    label input { margin-right: 8px; }
    /* styled the submit button dark with a hover state to indicate interactivity */
    button { width: 100%; padding: 9px; background: #222; color: #fff; border: none; border-radius: 3px; font-size: 14px; cursor: pointer; margin-top: 8px; }
    button:hover { background: #444; }
    /* displayed error messages in red if no method was selected or sending failed */
    .error { color: red; font-size: 13px; margin-bottom: 12px; }
    a { font-size: 13px; color: #555; display: block; margin-top: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Two-Factor Authentication</h2>
    <p>Choose how to receive your code:</p>
    <!-- showed the error message passed from the Flask route if something went wrong -->
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post">
      <!-- used radio buttons so only one method can be selected at a time -->
      <label><input type="radio" name="method" value="sms" required> SMS</label>
      <label><input type="radio" name="method" value="email"> Email</label>
      <label><input type="radio" name="method" value="totp"> Authenticator App (TOTP)</label>
      <button type="submit">Continue</button>
    </form>
    <!-- gave the user a way to go back and log in with different credentials -->
    <a href="/">← Back to login</a>
  </div>
</body>
</html>
